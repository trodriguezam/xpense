# Genera el proyecto con XcodeGen:  brew install xcodegen && xcodegen generate
name: Xpense
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: ""            # <- tu Team ID (cuenta pagada)
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  Xpense:
    type: application
    platform: iOS
    sources: [Xpense, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cl.tuequipo.xpense   # <- cámbialo por tu dominio
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    entitlements:
      path: Xpense/Xpense.entitlements
      properties:
        com.apple.security.application-groups: [group.cl.tuequipo.xpense]
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.icloud-container-identifiers: [iCloud.cl.tuequipo.xpense]
    info:
      path: Xpense/Info.plist
      properties:
        CFBundleDisplayName: xpense
        CFBundleDevelopmentRegion: es_CL
        UIBackgroundModes: [remote-notification]   # sync silencioso de CloudKit
        ITSAppUsesNonExemptEncryption: false
    dependencies:
      - target: XpenseWidget
        embed: true
  XpenseWidget:
    type: app-extension
    platform: iOS
    sources: [XpenseWidget, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cl.tuequipo.xpense.widget
    entitlements:
      path: XpenseWidget/XpenseWidget.entitlements
      properties:
        com.apple.security.application-groups: [group.cl.tuequipo.xpense]
    info:
      path: XpenseWidget/Info.plist
      properties:
        CFBundleDisplayName: xpense
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
