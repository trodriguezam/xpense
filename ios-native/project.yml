# Genera el proyecto con XcodeGen:  brew install xcodegen && xcodegen generate
name: Xpense
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: es   # idioma base; en inglés se usa Shared/Localizable.xcstrings
settings:
  base:
    DEVELOPMENT_TEAM: "9T6BFX3WVY"            # <- Team ID (Manuel Tagle, cuenta pagada)
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  Xpense:
    type: application
    platform: iOS
    sources: [Xpense, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cl.trodriguezam.xpense   # <- cámbialo por tu dominio
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon          # usa Xpense/AppIcon.icon (Icon Composer)
    entitlements:
      path: Xpense/Xpense.entitlements
      properties:
        com.apple.security.application-groups: [group.cl.trodriguezam.xpense]
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.icloud-container-identifiers: [iCloud.cl.trodriguezam.xpense]
    info:
      path: Xpense/Info.plist
      properties:
        CFBundleDisplayName: Xpense
        CFBundleDevelopmentRegion: es
        UIBackgroundModes: [remote-notification]   # sync silencioso de CloudKit
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}                         # launch screen nativo (evita modo escalado)
        UIRequiresFullScreen: true                 # app de iPhone enfocada (sin multitarea iPad)
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - target: XpenseWidget
        embed: true
  XpenseWidget:
    type: app-extension
    platform: iOS
    sources: [XpenseWidget, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cl.trodriguezam.xpense.widget
    entitlements:
      path: XpenseWidget/XpenseWidget.entitlements
      properties:
        com.apple.security.application-groups: [group.cl.trodriguezam.xpense]
    info:
      path: XpenseWidget/Info.plist
      properties:
        CFBundleDisplayName: Xpense
        CFBundleDevelopmentRegion: es
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
